<!doctype html>
<html lang="zh-Hant">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title data-i18n="admin.consoleTitle">emfont</title>
		<link rel="icon" type="image/svg+xml" href="/assets/img/logo/favicon.svg" />
		<link rel="stylesheet" href="/assets/admin-font-upload.css" />
	</head>
	<body>
		<main class="admin-shell admin-shell-wide">
			<header>
				<a
					href="/"
					aria-label="Home"
					data-i18n-attrs="aria-label:admin.backHome"
				>
					<img src="/assets/img/logo/emfont-logo-light.svg" alt="emfont" />
				</a>
				<div>
					<p>Super admin</p>
					<h1 data-i18n="admin.console"></h1>
				</div>
				<nav
					class="admin-nav"
					aria-label="Admin pages"
					data-i18n-attrs="aria-label:admin.adminPages"
				>
					<a href="/admin/fonts" data-i18n="admin.addFont"></a>
					<a href="/admin/fonts/edit" data-i18n="admin.editFontInfo"></a>
					<button id="admin-logout" class="link-button" type="button">
						<span data-i18n="admin.logout"></span>
					</button>
				</nav>
			</header>

			<section
				class="workspace"
				aria-label="Add admin"
				data-i18n-attrs="aria-label:admin.addAdmin"
			>
				<form id="admin-create-form">
					<div class="form-grid compact-form-grid">
						<label>
							<span data-i18n="admin.account"></span>
							<input name="userId" required autocomplete="username" />
						</label>
						<label>
							<span data-i18n="admin.password"></span>
							<input
								name="password"
								type="password"
								required
								minlength="8"
								autocomplete="new-password"
							/>
						</label>
						<label>
							<span data-i18n="admin.role"></span>
							<select name="role">
								<option value="admin" data-i18n="admin.regularAdmin"></option>
								<option value="super_admin">Super admin</option>
							</select>
						</label>
					</div>
					<div class="actions">
						<button type="submit" data-i18n="admin.createAdmin"></button>
						<p id="admin-create-status" role="status" aria-live="polite"></p>
					</div>
				</form>
			</section>

			<section
				class="workspace"
				aria-label="Admin list"
				data-i18n-attrs="aria-label:admin.adminList"
			>
				<div class="panel-heading">
					<strong data-i18n="admin.adminList"></strong>
				</div>
				<div id="admin-user-list" class="admin-user-list"></div>
				<p id="admin-list-status" role="status" aria-live="polite"></p>
			</section>
		</main>
		<script src="/assets/i18n.js"></script>
		<script src="/assets/admin-console.js"></script>
	</body>
</html>
