<!doctype html>
<html lang="zh-Hant">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title data-i18n="admin.editTitle">emfont</title>
		<link rel="icon" type="image/svg+xml" href="/assets/img/logo/favicon.svg" />
		<link rel="stylesheet" href="/assets/admin-font-upload.css" />
	</head>
	<body>
		<main class="admin-shell admin-shell-wide">
			<header>
				<a
					href="/"
					aria-label="Home"
					data-i18n-attrs="aria-label:admin.backHome"
				>
					<img src="/assets/img/logo/emfont-logo-light.svg" alt="emfont" />
				</a>
				<div>
					<p data-i18n="admin.tools"></p>
					<h1 data-i18n="admin.editFontInfo"></h1>
				</div>
				<nav
					class="admin-nav"
					aria-label="Admin pages"
					data-i18n-attrs="aria-label:admin.adminPages"
				>
					<a
						href="/admin/fonts"
						data-super-admin-only
						hidden
						data-i18n="admin.addFont"
					></a>
					<a
						href="/admin/console"
						data-super-admin-only
						hidden
						data-i18n="admin.console"
					></a>
					<button id="admin-logout" class="link-button" type="button">
						<span data-i18n="admin.logout"></span>
					</button>
				</nav>
			</header>

			<section
				class="workspace"
				aria-label="Font filters"
				data-i18n-attrs="aria-label:admin.fontFilter"
			>
				<div class="toolbar-grid">
					<label>
						<span data-i18n="admin.searchFont"></span>
						<input
							id="font-search"
							type="search"
							placeholder=""
							data-i18n-attrs="placeholder:admin.searchNameIdAuthor"
						/>
					</label>
					<label>
						<span data-i18n="admin.category"></span>
						<select id="category-filter">
							<option value="all" data-i18n="admin.allCategories"></option>
						</select>
					</label>
				</div>
			</section>

			<div class="admin-editor-layout">
				<section
					class="workspace font-browser"
					aria-label="Font list"
					data-i18n-attrs="aria-label:admin.fontList"
				>
					<div class="panel-heading">
						<strong data-i18n="admin.fontList"></strong>
						<button
							id="font-delete-button"
							class="danger-button"
							type="button"
							disabled
							hidden
						>
							<span data-i18n="admin.deleteFont"></span>
						</button>
					</div>
					<div id="font-list" class="admin-font-list"></div>
				</section>

				<section
					class="workspace editor-panel"
					aria-label="Edit font info"
					data-i18n-attrs="aria-label:admin.editFontPanel"
				>
					<form id="font-edit-form" hidden>
						<div class="form-grid">
							<label>
								<span data-i18n="admin.fontId"></span>
								<input name="id" readonly />
							</label>
							<label>
								<span data-i18n="admin.commonName"></span>
								<input name="name" required />
							</label>
							<label>
								<span data-i18n="admin.category"></span>
								<select name="category" required>
									<option value="sans-serif">sans-serif</option>
									<option value="serif">serif</option>
									<option value="monospace">monospace</option>
									<option value="cursive">cursive</option>
									<option value="fantasy">fantasy</option>
								</select>
							</label>
							<label>
								<span data-i18n="admin.nameZh"></span>
								<input name="nameZh" />
							</label>
							<label>
								<span data-i18n="admin.nameEn"></span>
								<input name="nameEn" />
							</label>
							<label>
								<span data-i18n="admin.weight"></span>
								<input name="weights" required placeholder="400, 700" />
							</label>
							<label>
								<span data-i18n="admin.family"></span>
								<input name="family" />
							</label>
							<label>
								<span data-i18n="admin.tags"></span>
								<input name="tags" placeholder="" />
							</label>
							<label>
								<span data-i18n="admin.author"></span>
								<input name="authors" placeholder="justfont" />
							</label>
							<label>
								<span data-i18n="admin.license"></span>
								<input name="license" />
							</label>
							<label>
								<span data-i18n="admin.version"></span>
								<input name="version" />
							</label>
							<label>
								<span data-i18n="admin.format"></span>
								<select name="format" required>
									<option value="ttf">ttf</option>
									<option value="otf">otf</option>
								</select>
							</label>
							<label data-super-admin-only hidden>
								<span data-i18n="admin.replacementWeight"></span>
								<input
									name="replacementWeight"
									type="number"
									min="1"
									max="1000"
									placeholder="400"
								/>
							</label>
							<label class="wide file-drop" data-super-admin-only hidden>
								<span data-i18n="admin.replacementFontFile"></span>
								<input
									name="fontFile"
									type="file"
									accept=".ttf,.otf,font/ttf,font/otf"
								/>
							</label>
							<label class="wide">
								<span data-i18n="admin.demoSentence"></span>
								<select name="demoContentId" id="demo-sentence-select"></select>
							</label>
							<label class="wide">
								<span data-i18n="admin.sourceUrl"></span>
								<input name="repoUrl" type="url" />
							</label>
							<label class="wide">
								<span data-i18n="admin.description"></span>
								<textarea name="description" rows="4"></textarea>
							</label>
						</div>

						<div class="actions">
							<button type="submit" data-i18n="admin.saveChanges"></button>
							<a
								id="font-preview-link"
								class="text-link"
								href="#"
								target="_blank"
							>
								<span data-i18n="admin.openFontPage"></span>
							</a>
						</div>
					</form>
					<p id="edit-status" role="status" aria-live="polite">
						<span data-i18n="admin.chooseFont"></span>
					</p>
				</section>
			</div>

			<section
				class="workspace"
				aria-label="Add demo sentence"
				data-i18n-attrs="aria-label:admin.addDemoSentence"
			>
				<form id="sentence-create-form" class="sentence-form">
					<label>
						<span data-i18n="admin.addDemoSentence"></span>
						<textarea name="content" rows="3" required></textarea>
					</label>
					<label>
						<span data-i18n="admin.language"></span>
						<input name="language" placeholder="zh-hant" />
					</label>
					<button type="submit" data-i18n="admin.addSentence"></button>
				</form>
				<p id="sentence-status" role="status" aria-live="polite"></p>
			</section>
		</main>
		<script src="/assets/i18n.js"></script>
		<script src="/assets/admin-font-edit.js"></script>
	</body>
</html>
