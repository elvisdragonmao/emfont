<!doctype html>
<html lang="zh-Hant">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title data-i18n="admin.uploadTitle">emfont</title>
		<link rel="icon" type="image/svg+xml" href="/assets/img/logo/favicon.svg" />
		<link rel="stylesheet" href="/assets/admin-font-upload.css" />
	</head>
	<body>
		<main class="admin-shell">
			<header>
				<a
					href="/"
					aria-label="Home"
					data-i18n-attrs="aria-label:admin.backHome"
				>
					<img src="/assets/img/logo/emfont-logo-light.svg" alt="emfont" />
				</a>
				<div>
					<p data-i18n="admin.tools"></p>
					<h1 data-i18n="admin.addFont"></h1>
				</div>
				<nav
					class="admin-nav"
					aria-label="Admin pages"
					data-i18n-attrs="aria-label:admin.adminPages"
				>
					<a href="/admin/fonts/edit" data-i18n="admin.editFontInfo"></a>
					<a href="/admin/console" data-i18n="admin.console"></a>
					<button id="admin-logout" class="link-button" type="button">
						<span data-i18n="admin.logout"></span>
					</button>
				</nav>
			</header>

			<section
				class="workspace"
				aria-label="Add font form"
				data-i18n-attrs="aria-label:admin.fontForm"
			>
				<form id="font-upload-form">
					<div class="form-grid">
						<label>
							<span data-i18n="admin.fontId"></span>
							<input
								name="id"
								required
								pattern="[A-Za-z0-9_-]+"
								placeholder="jfOpenHuninn"
							/>
						</label>
						<label>
							<span data-i18n="admin.weight"></span>
							<input
								name="weight"
								required
								type="number"
								min="1"
								max="1000"
								value="400"
							/>
						</label>
						<label>
							<span data-i18n="admin.category"></span>
							<select name="category" required>
								<option value="sans-serif">sans-serif</option>
								<option value="serif">serif</option>
								<option value="monospace">monospace</option>
								<option value="cursive">cursive</option>
								<option value="fantasy">fantasy</option>
							</select>
						</label>
						<label>
							<span data-i18n="admin.commonName"></span>
							<input name="name" required placeholder="jf open Huninn" />
						</label>
						<label>
							<span data-i18n="admin.nameZh"></span>
							<input name="nameZh" placeholder="" />
						</label>
						<label>
							<span data-i18n="admin.nameEn"></span>
							<input name="nameEn" placeholder="jf open Huninn" />
						</label>
						<label>
							<span data-i18n="admin.family"></span>
							<input name="family" placeholder="" />
						</label>
						<label>
							<span data-i18n="admin.tags"></span>
							<input name="tags" placeholder="" />
						</label>
						<label>
							<span data-i18n="admin.author"></span>
							<input name="authors" placeholder="justfont" />
						</label>
						<label>
							<span data-i18n="admin.license"></span>
							<input name="license" placeholder="SIL Open Font License 1.1" />
						</label>
						<label>
							<span data-i18n="admin.version"></span>
							<input name="version" placeholder="v1.0" />
						</label>
						<label class="wide">
							<span data-i18n="admin.sourceUrl"></span>
							<input
								name="repoUrl"
								type="url"
								placeholder="https://github.com/..."
							/>
						</label>
						<label class="wide">
							<span data-i18n="admin.description"></span>
							<textarea name="description" rows="4"></textarea>
						</label>
						<label class="wide file-drop">
							<span data-i18n="admin.originalFontFile"></span>
							<input
								name="fontFile"
								type="file"
								accept=".ttf,.otf,font/ttf,font/otf"
								required
							/>
						</label>
					</div>

					<div class="actions">
						<button type="submit" data-i18n="admin.uploadAndGenerate"></button>
						<p
							id="upload-status"
							role="status"
							aria-live="polite"
							data-i18n="admin.notUploaded"
						></p>
					</div>
				</form>
			</section>
		</main>
		<script src="/assets/i18n.js"></script>
		<script src="/assets/admin-font-upload.js"></script>
	</body>
</html>
